<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Garden Links</title>
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <img
        class="decorative-leaf decorative-leaf-left"
        src="assets/icons/leaf-right.webp"
        alt=""
        aria-hidden="true"
        decoding="async"
      />
      <img
        class="decorative-leaf decorative-leaf-right"
        src="assets/icons/leaf-left.webp"
        alt=""
        aria-hidden="true"
        decoding="async"
      />

      <section class="linktree" aria-labelledby="page-title">
        <header class="brand">
          <img
            class="brand-logo"
            src="assets/secret-garden-logo.webp"
            alt="Secret Garden"
            width="512"
            height="512"
            decoding="async"
          />
          <h1 id="page-title">Secret Garden</h1>
        </header>

        <nav class="links" id="links" aria-label="Secret Garden Links"></nav>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
